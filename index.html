<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="波妞记账">
  <meta name="theme-color" content="#F5F7F5">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>波妞记账</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">

  <div id="toast" class="toast hidden"></div>

  <!-- ==================== 首页 ==================== -->
  <div class="page active" id="page-home">
    <div class="nav-header">
      <div class="nav-title">🌸 波妞记账</div>
      <button class="nav-icon" onclick="showSearch()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <div class="month-picker">
      <button class="month-picker-arrow" onclick="homePrevMonth()">‹</button>
      <span class="month-picker-text" id="home-month-title"></span>
      <button class="month-picker-arrow" id="home-next-arrow" onclick="homeNextMonth()">›</button>
    </div>
    <div class="home-summary" id="home-summary">
      <div class="item"><div class="lbl">收入</div><div class="val inc" id="home-income">¥0</div></div>
      <div class="item"><div class="lbl">支出</div><div class="val exp" id="home-expense">¥0</div></div>
    </div>
    <div id="home-day-groups"></div>
    <div class="empty-state hidden" id="home-empty">
      <div style="font-size:40px">📝</div>
      <div class="empty-state-text">本月还没有记录</div>
    </div>
  </div>

  <!-- ==================== 图表页 ==================== -->
  <div class="page" id="page-stats">
    <div class="nav-header"><div class="nav-title">图表</div><div style="width:36px"></div></div>
    <!-- 支出/收入切换 -->
    <div class="stats-tabs mt-8" id="stats-type-tabs">
      <button class="active" data-type="expense" onclick="switchStatsType('expense')">支出</button>
      <button data-type="income" onclick="switchStatsType('income')">收入</button>
    </div>
    <!-- 周期切换 -->
    <div class="stats-period" id="stats-period-tabs">
      <button class="active" data-period="month" onclick="switchStatsPeriod('month')">月</button>
      <button data-period="year" onclick="switchStatsPeriod('year')">年</button>
    </div>
    <div class="month-picker" id="stats-month-picker">
      <button class="month-picker-arrow" onclick="statsPrevMonth()">‹</button>
      <span class="month-picker-text" id="stats-period-title"></span>
      <button class="month-picker-arrow" id="stats-next-period" onclick="statsNextMonth()">›</button>
    </div>
    <div class="chart-wrap"><canvas id="chart-main" style="height:200px"></canvas></div>
    <div class="section-title">排行榜</div>
    <div class="category-rank" id="stats-rank"></div>
  </div>

  <!-- ==================== 资产页 ==================== -->
  <div class="page" id="page-assets">
    <div class="nav-header">
      <div class="nav-title">资产</div>
      <button class="nav-icon" onclick="showAddAccount()" style="font-size:20px">+</button>
    </div>
    <div class="dual-cards mt-8">
      <div class="dual-card"><div class="dual-card-label">总资产</div><div class="dual-card-amount income" id="asset-total-assets">¥0</div></div>
      <div class="dual-card"><div class="dual-card-label">总负债</div><div class="dual-card-amount expense" id="asset-total-liabilities">¥0</div></div>
      <div class="dual-card"><div class="dual-card-label">净资产</div><div class="dual-card-amount" style="color:var(--primary)" id="asset-networth">¥0</div></div>
    </div>
    <div class="section-title mt-12">账户列表</div>
    <div id="asset-sections"></div>
  </div>

  <!-- ==================== 我的 ==================== -->
  <div class="page" id="page-profile">
    <div class="nav-header"><div class="nav-title">我的</div><div style="width:36px"></div></div>
    <div class="section-title">数据</div>
    <div class="settings-list">
      <div class="settings-item" onclick="triggerCSVImport()"><span class="settings-item-icon">📥</span><span class="settings-item-label">导入 CSV</span></div>
      <div class="settings-divider"></div>
      <div class="settings-item" onclick="triggerCSVExport()"><span class="settings-item-icon">📤</span><span class="settings-item-label">导出 CSV</span></div>
    </div>
    <div class="section-title mt-16">设置</div>
    <div class="settings-list">
      <div class="settings-item" onclick="showCatManagement()"><span class="settings-item-icon">🏷️</span><span class="settings-item-label">类别设置</span></div>
    </div>
    <div class="section-title mt-16">关于</div>
    <div class="settings-list">
      <div class="settings-item" style="cursor:default"><span class="settings-item-label">版本</span><span style="font-size:13px;color:var(--text-secondary)">1.0.0</span></div>
    </div>
  </div>

  <!-- ==================== 底部记账抽屉 ==================== -->
  <div class="sheet-overlay hidden" id="sheet-overlay" onclick="if(event.target===this)closeSheet()">
    <div class="sheet" id="sheet">

      <!-- 第一步：分类选择 -->
      <div class="sheet-page active" id="sheet-step1">
        <div class="sheet-handle"></div>
        <div class="sheet-segment" id="sheet-segment">
          <button class="expense active" data-type="expense" onclick="sheetSwitchType('expense')">支出</button>
          <button class="income" data-type="income" onclick="sheetSwitchType('income')">收入</button>
        </div>
        <div class="cat-grid" id="sheet-cat-grid"></div>
      </div>

      <!-- 第二步：金额输入 -->
      <div class="sheet-page" id="sheet-step2">
        <div class="step2-top">
          <button class="step2-back" onclick="sheetBackToStep1()">←</button>
          <span class="step2-cat" id="step2-cat-label"></span>
          <div style="width:36px"></div>
        </div>
        <div class="amount-display" id="step2-amount">¥<span class="currency">0</span></div>
        <div class="num-pad">
          <div class="num-row"><button class="num-key" onclick="nk('1')">1</button><button class="num-key" onclick="nk('2')">2</button><button class="num-key" onclick="nk('3')">3</button></div>
          <div class="num-row"><button class="num-key" onclick="nk('4')">4</button><button class="num-key" onclick="nk('5')">5</button><button class="num-key" onclick="nk('6')">6</button></div>
          <div class="num-row"><button class="num-key" onclick="nk('7')">7</button><button class="num-key" onclick="nk('8')">8</button><button class="num-key" onclick="nk('9')">9</button></div>
          <div class="num-row"><button class="num-key today" onclick="nk('today')">今天</button><button class="num-key" onclick="nk('0')">0</button><button class="num-key" onclick="nk('.')">.</button></div>
          <div class="num-row"><button class="num-key done" onclick="sheetGoToStep3()">下一步</button><button class="num-key" onclick="nk('⌫')" style="font-size:18px">⌫</button></div>
        </div>
      </div>

      <!-- 第三步：标签 + 完成 -->
      <div class="sheet-page" id="sheet-step3">
        <div class="step3-top">
          <button class="step2-back" onclick="sheetBackToStep2()">←</button>
          <span class="step3-title">添加标签</span>
          <div style="width:36px"></div>
        </div>
        <div style="text-align:center;padding:8px;font-size:20px;font-weight:700" id="step3-cat-info"></div>
        <div class="tag-scroll" id="step3-tags"></div>
        <div class="tag-input-row hidden" id="step3-tag-input-row">
          <input id="step3-tag-input" placeholder="输入新标签..."><button onclick="confirmStep3Tag()">添加</button>
        </div>
        <button class="step3-complete" onclick="sheetComplete()">✓ 完成</button>
      </div>
    </div>
  </div>

  <!-- ==================== 交易详情 ==================== -->
  <div class="page" id="page-txn-detail">
    <div class="nav-header">
      <button class="nav-icon" onclick="closeTxnDetail()">←</button><div class="nav-title">详情</div>
      <button class="nav-icon" onclick="editTxnDetail()" style="font-size:13px">编辑</button>
    </div>
    <span id="detail-id" data-id="" hidden></span>
    <div class="detail-amount" id="detail-amount"></div>
    <div class="detail-category" id="detail-cat"></div>
    <div class="settings-list mt-8">
      <div class="settings-item" style="cursor:default"><span class="settings-item-label">日期</span><span style="font-size:14px" id="detail-date"></span></div>
      <div class="settings-divider" id="detail-note-row" style="display:none"></div>
      <div class="settings-item" id="detail-note-row2" style="cursor:default;display:none"><span class="settings-item-label">备注</span><span style="font-size:14px" id="detail-note"></span></div>
    </div>
    <div style="padding:0 16px;margin-top:20px"><button class="btn-danger" onclick="deleteTxnDetail()">删除此记录</button></div>
  </div>

  <!-- ==================== 搜索 ==================== -->
  <div class="page" id="page-search">
    <div class="nav-header"><button class="nav-icon" onclick="closeSearch()">←</button><div class="nav-title">搜索</div><div style="width:36px"></div></div>
    <div class="search-bar"><div class="search-input-wrap"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="search-input" placeholder="搜索..." oninput="doSearch()"></div></div>
    <div class="filter-chips"><button class="filter-chip active" id="sf-all" onclick="setSearchType(null)">全部</button><button class="filter-chip" id="sf-exp" onclick="setSearchType('expense')">支出</button><button class="filter-chip" id="sf-inc" onclick="setSearchType('income')">收入</button></div>
    <div class="empty-state hidden" id="search-empty"><div style="font-size:32px">🔍</div><div class="empty-state-text">没有找到</div></div>
    <div id="search-txn-list"></div>
  </div>

  <!-- ==================== 账户表单 ==================== -->
  <div class="page" id="page-add-account">
    <div class="nav-header"><button class="nav-icon" onclick="closeAddAccount()">取消</button><div class="nav-title" id="acc-form-title">添加账户</div><button class="nav-icon" onclick="saveAccount()" style="color:var(--primary);font-weight:600">保存</button></div>
    <div class="section-title">类型</div>
    <div class="type-grid" id="acc-type-grid"></div>
    <div class="settings-list mt-12">
      <div class="form-row"><span class="form-row-icon">📝</span><span class="form-row-label">名称</span><input class="form-row-value" id="acc-name-input" placeholder='如"建设银行"'></div>
      <div class="form-row" style="border-top:.5px solid var(--divider)"><span class="form-row-icon">💰</span><span class="form-row-label">余额</span><input class="form-row-value" id="acc-balance-input" type="number" step="0.01" placeholder="0.00"></div>
      <div id="acc-custom-type" style="display:none"><div class="form-row" style="border-top:.5px solid var(--divider)"><span class="form-row-icon">🏷️</span><span class="form-row-label">类目</span><input class="form-row-value" id="acc-custom-type-input" placeholder='如"理财产品"'></div></div>
      <div class="form-row" style="border-top:.5px solid var(--divider)"><span class="form-row-icon">✏️</span><span class="form-row-label">备注</span><input class="form-row-value" id="acc-note-input" placeholder="选填"></div>
    </div>
    <div style="padding:16px"><button class="btn-primary" onclick="saveAccount()">保存</button><button id="acc-delete-btn" class="btn-danger mt-12" style="display:none" onclick="deleteAccountFromForm()">删除此账户</button></div>
  </div>

  <!-- ==================== 类别设置 ==================== -->
  <div class="page" id="page-cat-mgmt">
    <div class="nav-header"><button class="nav-icon" onclick="closeCatManagement()">←</button><div class="nav-title">类别设置</div><div style="width:36px"></div></div>
    <div class="sheet-segment mt-8" id="cat-mgmt-segment" style="padding:0 60px">
      <button class="expense active" data-type="expense" onclick="switchCatMgmtType('expense')">支出</button>
      <button class="income" data-type="income" onclick="switchCatMgmtType('income')">收入</button>
    </div>
    <div id="cat-mgmt-body" style="padding-top:12px"></div>
  </div>

  <!-- ==================== 日期弹窗 ==================== -->
  <div class="modal-overlay hidden" id="overlay-date-picker" onclick="if(event.target===this)closeDatePicker()">
    <div class="modal"><div class="modal-title">选择日期</div><input type="date" id="txn-date-input" style="width:100%;padding:12px;border:1px solid var(--divider);border-radius:10px;font-size:15px;text-align:center"><div class="modal-actions"><button class="btn-outline" onclick="closeDatePicker()">取消</button><button class="btn-primary" onclick="confirmDate()" style="flex:1">确定</button></div></div>
  </div>

  <!-- ==================== 底部 TabBar ==================== -->
  <div class="tab-bar">
    <div class="tab-item active" data-tab="home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>首页</span>
    </div>
    <div class="tab-item" data-tab="stats" onclick="switchTab('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>图表</span>
    </div>
    <div class="tab-item" data-tab="assets" onclick="switchTab('assets')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><span>资产</span>
    </div>
    <div class="tab-item" data-tab="profile" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span>
    </div>
  </div>

  <!-- ==================== 悬浮 FAB（底部中央） ==================== -->
  <button class="fab" id="fab-add" onclick="openSheet()">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

</div>

<script src="js/db.js"></script>
<script src="js/categories.js"></script>
<script src="js/csv.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
